# ACBL v2 — Blueprint automation instances for all 17 units
automation:
  - alias: "ACBL-V1-Master"
    description: "ACBL v2 automation for V1 Master"
    use_blueprint:
      path: AC/acbl-v2.yaml
      input:
        ac_switch: switch.ac_v1_master
        power_sensor: sensor.ac_v1_master_power
        ac_mode: input_select.ac_mode_v1_master
        temperature_sensor: "sensor.homenode_sense_temp_v1_master_bme280_temperature"
        humidity_sensor: "sensor.homenode_sense_temp_v1_master_bme280_humidity"
        power_source_sensor: sensor.villa_1_power_source
        grid_stable_boolean: input_boolean.grid_power_stable
        pre_outage_state: input_boolean.ac_pre_outage_v1_master
        target_temp_helper: input_number.ac_target_temp_v1_master
        high_temp_helper: input_number.ac_high_temp_v1_master
        start_time_helper: input_datetime.ac_start_time_v1_master
        end_time_helper: input_datetime.ac_end_time_v1_master
        last_off_helper: input_datetime.ac_last_off_v1_master
        min_off_helper: input_number.ac_min_off_v1_master
        quick_cool_timer: timer.ac_quick_cool_v1_master
        quick_cool_baseline_temp: input_number.ac_qc_baseline_temp_v1_master
        quick_cool_baseline_humidity: input_number.ac_qc_baseline_humidity_v1_master

